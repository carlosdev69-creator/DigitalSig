<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digital Signage - Americana</title>

  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      --card-bg: rgba(30, 41, 59, 0.7);
      --text-main: #f8fafc;
      --accent: #38bdf8;
      --loto-color: #9b51e0;
      --mega-color: #209869;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      background: var(--bg-gradient);
      color: var(--text-main);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      padding: 3vh 5vw;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 20%, rgba(56, 189, 248, 0.10), transparent 30%),
        radial-gradient(circle at 80% 15%, rgba(155, 81, 224, 0.10), transparent 25%),
        radial-gradient(circle at 50% 80%, rgba(32, 152, 105, 0.08), transparent 30%);
      pointer-events: none;
      z-index: 0;
    }

    .logo-container,
    #weather-widget,
    header,
    main {
      position: relative;
      z-index: 1;
    }

    .logo-container {
      position: absolute;
      top: 3vh;
      left: 5vw;
      z-index: 20;
    }

    .logo-container img {
      max-height: 60px;
      filter: drop-shadow(0 0 10px rgba(0, 0, 0, 0.5));
    }

    #weather-widget {
      position: absolute;
      top: 3vh;
      right: 5vw;
      text-align: right;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 18px;
      padding: 0.9rem 1rem;
      min-width: 180px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.18);
      backdrop-filter: blur(12px);
    }

    #temp {
      font-size: 2.8rem;
      font-weight: bold;
      line-height: 1;
    }

    #condition {
      font-size: 1.1rem;
      color: #fff;
      margin-top: 4px;
      text-transform: capitalize;
    }

    #city-label {
      font-size: 1rem;
      color: var(--accent);
      margin-top: 2px;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    #date {
      font-size: 1.15rem;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.9;
    }

    #clock {
      font-size: 5.8rem;
      font-weight: 800;
      line-height: 1;
      text-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
    }

    main {
      flex: 1;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .slide {
      position: absolute;
      width: 100%;
      max-width: 1100px;
      background: linear-gradient(180deg, rgba(30, 41, 59, 0.82), rgba(15, 23, 42, 0.9));
      padding: 3.2rem;
      border-radius: 28px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(18px);
      box-shadow:
        0 20px 60px rgba(0, 0, 0, 0.35),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.8s ease-in-out, transform 0.8s ease-in-out;
      transform: translateY(8px);
    }

    .slide.active {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    h2 {
      margin-bottom: 2rem;
      font-size: 2.2rem;
      font-weight: 700;
      border-left: 5px solid var(--accent);
      padding-left: 1rem;
      line-height: 1.2;
    }

    .loto-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 15px;
      justify-items: center;
    }

    .mega-grid {
      grid-template-columns: repeat(6, 1fr) !important;
    }

    .ball {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.55rem;
      font-weight: 700;
      color: #fff;
      background: radial-gradient(circle at 30% 30%, #b76cff, #7c2fd1);
      box-shadow:
        inset 0 2px 8px rgba(255, 255, 255, 0.18),
        0 8px 20px rgba(0, 0, 0, 0.28);
    }

    .mega-grid .ball {
      background: radial-gradient(circle at 30% 30%, #36c98d, #14875b);
    }

    .news-item {
      padding: 1rem 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .news-item:last-child {
      border-bottom: none;
    }

    .news-item h4 {
      font-size: 1.25rem;
      line-height: 1.45;
      font-weight: 600;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    @media (max-width: 1024px) {
      #clock {
        font-size: 4.5rem;
      }

      .slide {
        padding: 2rem;
      }

      .ball {
        width: 58px;
        height: 58px;
        font-size: 1.4rem;
      }
    }

    .footer-watermark {
    position: fixed;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.95rem;
    color: rgba(255, 255, 255, 0.22);
    letter-spacing: 1px;
    z-index: 1;
    pointer-events: none;
    user-select: none;
    }




  </style>
</head>
<body>
  <div class="logo-container">
    <img src="logo-empresa.png" alt="Logo da empresa" />
  </div>

  <div id="weather-widget">
    <div id="temp">--°C</div>
    <div id="condition">Buscando clima...</div>
    <div id="city-label">Americana/SP</div>
  </div>

  <header>
    <div id="date">--</div>
    <div id="clock">00:00:00</div>
  </header>

  <main>
    <div id="slide-lottery" class="slide active">
      <h2 id="lottery-title">Lotofácil</h2>
      <div id="lottery-results" class="loto-grid">Aguardando dados...</div>
    </div>

    <div id="slide-mega" class="slide">
      <h2 id="mega-title" style="border-left-color: var(--mega-color);">
        Mega-Sena
      </h2>
      <div id="mega-results" class="loto-grid mega-grid">Aguardando dados...</div>
    </div>

    <div id="slide-news" class="slide">
      <h2>G1 - Região de Campinas</h2>
      <div id="news-container">Buscando notícias...</div>
    </div>
  </main>

   <div class="footer-watermark">
        www.itea.com.br
    </div>


  <script>
    const CONFIG = {
      INTERVAL_SLIDE: 15000,
      INTERVAL_REFRESH: 10 * 60 * 1000
    };

    function updateClock() {
      const now = new Date();

      const dateOpts = {
        weekday: "long",
        day: "numeric",
        month: "long",
        year: "numeric",
        timeZone: "America/Sao_Paulo"
      };

      const timeOpts = {
        timeZone: "America/Sao_Paulo",
        hour12: false,
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
      };

      document.getElementById("date").innerText =
        now.toLocaleDateString("pt-BR", dateOpts).toUpperCase();

      document.getElementById("clock").innerText =
        now.toLocaleTimeString("pt-BR", timeOpts);
    }

    let currentSlide = 0;

    function rotateSlides() {
      const slides = document.querySelectorAll(".slide");
      slides[currentSlide].classList.remove("active");
      currentSlide = (currentSlide + 1) % slides.length;
      slides[currentSlide].classList.add("active");
    }

    async function getJson(url) {
      const response = await fetch(url, {
        method: "GET",
        headers: {
          "Content-Type": "application/json"
        },
        cache: "no-store"
      });

      const data = await response.json().catch(() => ({}));

      if (!response.ok) {
        throw new Error(data.error || `Erro HTTP ${response.status}`);
      }

      return data;
    }

    async function updateWeather() {
      try {
        const data = await getJson("/api/weather");

        document.getElementById("temp").innerText = `${data.temp}°C`;
        document.getElementById("condition").innerText = data.description;
        document.getElementById("city-label").innerText =
          data.cityLabel || "Americana/SP";
      } catch (error) {
        console.error("Erro ao atualizar clima:", error);
        document.getElementById("condition").innerText = "Erro ao ler clima";
      }
    }

    async function updateLoterias() {
      try {
        const data = await getJson("/api/loterias");

        const megaTitle = document.getElementById("mega-title");
        const megaResults = document.getElementById("mega-results");
        megaTitle.innerText = `Mega-Sena - Concurso ${data.mega.concurso}`;
        megaResults.innerHTML = data.mega.dezenas
          .map((numero) => `<div class="ball">${numero}</div>`)
          .join("");

        const lotoTitle = document.getElementById("lottery-title");
        const lotoResults = document.getElementById("lottery-results");
        lotoTitle.innerText = `Lotofácil - Concurso ${data.lotofacil.concurso}`;
        lotoResults.innerHTML = data.lotofacil.dezenas
          .map((numero) => `<div class="ball">${numero}</div>`)
          .join("");
      } catch (error) {
        console.error("Erro ao atualizar loterias:", error);
        document.getElementById("mega-results").innerText = "Erro ao buscar Mega-Sena";
        document.getElementById("lottery-results").innerText = "Erro ao buscar Lotofácil";
      }
    }

    async function updateNews() {
      try {
        const data = await getJson("/api/news");
        const container = document.getElementById("news-container");

        if (!Array.isArray(data.items) || data.items.length === 0) {
          container.innerText = "Nenhuma notícia encontrada";
          return;
        }

        container.innerHTML = data.items
          .map(
            (item) => `
              <div class="news-item">
                <h4>${item.title}</h4>
              </div>
            `
          )
          .join("");
      } catch (error) {
        console.error("Erro ao atualizar notícias:", error);
        document.getElementById("news-container").innerText =
          "Erro ao buscar Notícias G1";
      }
    }

    async function refreshAll() {
      await Promise.allSettled([
        updateWeather(),
        updateLoterias(),
        updateNews()
      ]);
    }

    updateClock();
    setInterval(updateClock, 1000);

    setInterval(rotateSlides, CONFIG.INTERVAL_SLIDE);

    refreshAll();
    setInterval(refreshAll, CONFIG.INTERVAL_REFRESH);
  </script>
 
</body>
</html>
