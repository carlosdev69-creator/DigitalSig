<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Signage - Americana</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --accent: #38bdf8;
            --loto-color: #9b51e0;
            --mega-color: #209869;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg-gradient); color: var(--text-main); height: 100vh; overflow: hidden; display: flex; flex-direction: column; padding: 3vh 5vw; }
        .logo-container { position: absolute; top: 3vh; left: 5vw; z-index: 20; }
        .logo-container img { max-height: 60px; filter: drop-shadow(0 0 10px rgba(0,0,0,0.5)); }
        #weather-widget { position: absolute; top: 3vh; right: 5vw; text-align: right; }
        #temp { font-size: 2.8rem; font-weight: bold; }
        header { text-align: center; margin-bottom: 2rem; }
        #date { font-size: 1.5rem; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; }
        #clock { font-size: 6.5rem; font-weight: 800; line-height: 1; }
        main { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; }
        .slide { position: absolute; width: 100%; max-width: 1000px; background: var(--card-bg); padding: 3rem; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(15px); opacity: 0; visibility: hidden; transition: opacity 1s ease-in-out; }
        .slide.active { opacity: 1; visibility: visible; }
        h2 { margin-bottom: 2rem; font-size: 2rem; border-left: 6px solid var(--accent); padding-left: 1.5rem; }
        .loto-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; justify-items: center; }
        .mega-grid { grid-template-columns: repeat(6, 1fr) !important; }
        .ball { width: 70px; height: 70px; background: var(--loto-color); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; font-weight: bold; box-shadow: 5px 5px 15px rgba(0,0,0,0.4); }
        .mega-grid .ball { background: var(--mega-color); }
        .news-item { padding: 1.2rem; border-bottom: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <div class="logo-container"><img src="logo-empresa.png" alt="Logo"></div>
    <div id="weather-widget"><div id="temp">26°C</div><div id="condition" style="color: var(--accent);">Americana/SP</div></div>
    <header><div id="date">--</div><div id="clock">00:00:00</div></header>
    <main>
        <div id="slide-lottery" class="slide active">
            <h2 id="lottery-title">Lotofácil - Concurso 3074</h2>
            <div id="lottery-results" class="loto-grid">
                <div class="ball">01</div><div class="ball">02</div><div class="ball">03</div><div class="ball">05</div><div class="ball">08</div>
                <div class="ball">09</div><div class="ball">12</div><div class="ball">13</div><div class="ball">15</div><div class="ball">16</div>
                <div class="ball">17</div><div class="ball">21</div><div class="ball">22</div><div class="ball">24</div><div class="ball">25</div>
            </div>
        </div>
        <div id="slide-mega" class="slide">
            <h2 id="mega-title" style="border-left-color: var(--mega-color);">Mega-Sena - Concurso 2710</h2>
            <div id="mega-results" class="loto-grid mega-grid">
                <div class="ball">12</div><div class="ball">23</div><div class="ball">34</div><div class="ball">45</div><div class="ball">56</div><div class="ball">58</div>
            </div>
        </div>
        <div id="slide-news" class="slide">
            <h2>G1 - Região de Campinas</h2>
            <div id="news-container">
                <div class="news-item"><h4>Confira as notícias em g1.globo.com/sp/campinas-regiao</h4></div>
                <div class="news-item"><h4>Dashboard em modo de atualização automática...</h4></div>
            </div>
        </div>
    </main>

    <script>
        const CONFIG = {
            CITY: 'Americana,BR',
            WEATHER_KEY: 'SUA_API_KEY_AQUI',
            NEWS_RSS: 'https://g1.globo.com/rss/g1/sp/campinas-regiao/',
            INTERVAL_SLIDE: 15000 
        };

        function updateClock() {
            const now = new Date();
            const dateOpts = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric', timeZone: 'America/Sao_Paulo' };
            const timeOpts = { timeZone: 'America/Sao_Paulo', hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' };
            document.getElementById('date').innerText = now.toLocaleDateString('pt-BR', dateOpts).toUpperCase();
            document.getElementById('clock').innerText = now.toLocaleTimeString('pt-BR', timeOpts);
        }
        setInterval(updateClock, 1000); updateClock();

        let currentSlide = 0;
        function rotateSlides() {
            const slides = document.querySelectorAll('.slide');
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }
        setInterval(rotateSlides, CONFIG.INTERVAL_SLIDE);

        async function fetchAPI(url) {
            // Tentamos 2 proxies diferentes em cascata
            const proxies = [
                `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
                `https://corsproxy.io/?${encodeURIComponent(url)}`
            ];
            for (let p of proxies) {
                try {
                    const res = await fetch(p);
                    const data = await res.json();
                    return JSON.parse(data.contents || data);
                } catch (e) { continue; }
            }
            return null;
        }

        async function fetchWeather() {
            const url = `https://api.openweathermap.org/data/2.5/weather?q=Americana&units=metric&lang=pt_br&appid=${CONFIG.WEATHER_KEY}`;
            const data = await fetchAPI(url);
            if (data && data.main) {
                document.getElementById('temp').innerText = `${Math.round(data.main.temp)}°C`;
                document.getElementById('condition').innerText = data.weather[0].description;
            }
        }

        async function fetchLoterias() {
            const base = "https://loteriascaixa-api.herokuapp.com/api";
            const mega = await fetchAPI(`${base}/megasena/latest`);
            if (mega) {
                document.getElementById('mega-title').innerText = `Mega-Sena - Concurso ${mega.concurso}`;
                const grid = document.getElementById('mega-results'); grid.innerHTML = '';
                mega.dezenas.forEach(n => { grid.innerHTML += `<div class="ball">${n}</div>`; });
            }
            const loto = await fetchAPI(`${base}/lotofacil/latest`);
            if (loto) {
                document.getElementById('lottery-title').innerText = `Lotofácil - Concurso ${loto.concurso}`;
                const grid = document.getElementById('lottery-results'); grid.innerHTML = '';
                loto.dezenas.forEach(n => { grid.innerHTML += `<div class="ball">${n}</div>`; });
            }
        }

        async function fetchNews() {
            try {
                const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(CONFIG.NEWS_RSS)}`);
                const data = await res.json();
                const items = new DOMParser().parseFromString(data.contents, "text/xml").querySelectorAll("item");
                if (items.length > 0) {
                    const container = document.getElementById('news-container'); container.innerHTML = '';
                    Array.from(items).slice(0, 4).forEach(i => {
                        container.innerHTML += `<div class="news-item"><h4>${i.querySelector("title").textContent}</h4></div>`;
                    });
                }
            } catch (e) {}
        }

        fetchWeather(); fetchLoterias(); fetchNews();
    </script>
</body>
</html>
