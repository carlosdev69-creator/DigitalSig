<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Digital Signage - Americana SP</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --accent: #38bdf8;
            --loto-color: #9b51e0;
            --mega-color: #209869;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 3vh 5vw;
        }

        /* LOGO SUPERIOR ESQUERDO */
        .logo-container {
            position: absolute;
            top: 3vh;
            left: 5vw;
            z-index: 20;
        }
        .logo-container img {
            max-height: 65px;
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));
        }

        /* CLIMA SUPERIOR DIREITO */
        #weather-widget {
            position: absolute;
            top: 3vh;
            right: 5vw;
            text-align: right;
        }
        #temp { font-size: 2.8rem; font-weight: bold; line-height: 1; }
        #condition { font-size: 1rem; color: var(--accent); text-transform: capitalize; margin-top: 5px; }

        /* HEADER CENTRAL */
        header { text-align: center; margin-bottom: 2rem; margin-top: 2vh; }
        #date { font-size: 1.5rem; color: var(--accent); letter-spacing: 4px; font-weight: 300; text-transform: uppercase; margin-bottom: 0.5rem; }
        #clock { font-size: 6.5rem; font-weight: 800; line-height: 1; text-shadow: 0 0 20px rgba(56, 189, 248, 0.3); }

        /* SLIDES */
        main { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; }
        .slide {
            position: absolute; width: 100%; max-width: 1000px;
            background: var(--card-bg); padding: 3rem; border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(15px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            opacity: 0; visibility: hidden; transition: opacity 1s ease-in-out;
        }
        .slide.active { opacity: 1; visibility: visible; }

        h2 { margin-bottom: 2rem; font-size: 2rem; border-left: 6px solid var(--accent); padding-left: 1.5rem; text-transform: uppercase; }

        /* LOTERIAS */
        .loto-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; justify-items: center; }
        .mega-grid { grid-template-columns: repeat(6, 1fr) !important; }
        .ball {
            width: 70px; height: 70px; background: var(--loto-color); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; font-weight: bold; box-shadow: inset -4px -4px 10px rgba(0,0,0,0.3), 5px 5px 15px rgba(0,0,0,0.4);
        }
        .mega-grid .ball { background: var(--mega-color); }

        /* NOTICIAS */
        .news-item { padding: 1.2rem; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .news-item h4 { font-size: 1.4rem; font-weight: 400; line-height: 1.4; }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="logo-empresa.png" alt="Logo">
    </div>

    <div id="weather-widget">
        <div id="temp">--°C</div>
        <div id="condition">Carregando Clima...</div>
    </div>

    <header>
        <div id="date">--</div>
        <div id="clock">00:00:00</div>
    </header>

    <main>
        <div id="slide-lottery" class="slide active">
            <h2 id="lottery-title">Lotofácil</h2>
            <div id="lottery-results" class="loto-grid"></div>
        </div>

        <div id="slide-mega" class="slide">
            <h2 id="mega-title" style="border-left-color: var(--mega-color);">Mega-Sena</h2>
            <div id="mega-results" class="loto-grid mega-grid"></div>
        </div>

        <div id="slide-news" class="slide">
            <h2>G1 - Região de Campinas</h2>
            <div id="news-container">Carregando notícias...</div>
        </div>
    </main>

    <script>
        const CONFIG = {
            CITY: 'Americana,BR',
            WEATHER_KEY: '83f925224e5f8488f26a6bb9831e3304', // INSIRA SUA CHAVE AQUI
            NEWS_RSS: 'https://g1.globo.com/rss/g1/sp/campinas-regiao/',
            INTERVAL_SLIDE: 15000 
        };

        // RELÓGIO AJUSTADO PARA FUSO HORÁRIO BRASÍLIA
        function updateClock() {
            const now = new Date();
            const dateOptions = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric', timeZone: 'America/Sao_Paulo' };
            const timeOptions = { timeZone: 'America/Sao_Paulo', hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' };
            
            document.getElementById('date').innerText = now.toLocaleDateString('pt-BR', dateOptions).toUpperCase();
            document.getElementById('clock').innerText = now.toLocaleTimeString('pt-BR', timeOptions);
        }
        setInterval(updateClock, 1000);
        updateClock();

        // ROTAÇÃO DE SLIDES
        let currentSlide = 0;
        function rotateSlides() {
            const slides = document.querySelectorAll('.slide');
            if (slides.length === 0) return;
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }
        setInterval(rotateSlides, CONFIG.INTERVAL_SLIDE);

        // BUSCA DE DADOS COM TRATAMENTO DE CACHE E PROXY
        async function fetchData(url) {
            try {
                // Adicionamos timestamp (&t=) para forçar a Vercel a buscar dados novos
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}&t=${Date.now()}`;
                const response = await fetch(proxyUrl);
                const data = await response.json();
                // O AllOrigins pode retornar o dado como string ou objeto, tratamos ambos:
                return typeof data.contents === 'string' ? JSON.parse(data.contents) : data.contents;
            } catch (e) {
                console.error("Erro na busca:", url, e);
                return null;
            }
        }

        async function fetchWeather() {
            const url = `https://api.openweathermap.org/data/2.5/weather?q=Americana,BR&units=metric&lang=pt_br&appid=${CONFIG.WEATHER_KEY}`;
            const data = await fetchData(url);
            if (data && data.main) {
                document.getElementById('temp').innerText = `${Math.round(data.main.temp)}°C`;
                document.getElementById('condition').innerText = data.weather[0].description;
            }
        }

        async function fetchLoterias() {
            const API_BASE = "https://loteriascaixa-api.herokuapp.com/api";

            // Mega-Sena
            const dataMega = await fetchData(`${API_BASE}/megasena/latest`);
            if (dataMega) {
                document.getElementById('mega-title').innerText = `Mega-Sena - Concurso ${dataMega.concurso || dataMega.numero}`;
                const grid = document.getElementById('mega-results');
                grid.innerHTML = '';
                const dezenas = dataMega.dezenas || dataMega.listaDezenas;
                if (dezenas) dezenas.forEach(num => {
                    grid.innerHTML += `<div class="ball">${num}</div>`;
                });
            }

            // Lotofácil
            const dataLoto = await fetchData(`${API_BASE}/lotofacil/latest`);
            if (dataLoto) {
                document.getElementById('lottery-title').innerText = `Lotofácil - Concurso ${dataLoto.concurso || dataLoto.numero}`;
                const grid = document.getElementById('lottery-results');
                grid.innerHTML = '';
                const dezenas = dataLoto.dezenas || dataLoto.listaDezenas;
                if (dezenas) dezenas.forEach(num => {
                    grid.innerHTML += `<div class="ball">${num}</div>`;
                });
            }
        }

        async function fetchNews() {
            try {
                const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(CONFIG.NEWS_RSS)}&t=${Date.now()}`);
                const data = await res.json();
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(data.contents, "text/xml");
                const items = xmlDoc.querySelectorAll("item");
                const container = document.getElementById('news-container');
                
                if (items.length > 0) {
                    container.innerHTML = '';
                    Array.from(items).slice(0, 4).forEach(item => {
                        const title = item.querySelector("title").textContent;
                        container.innerHTML += `<div class="news-item"><h4>${title}</h4></div>`;
                    });
                }
            } catch (e) { 
                console.error("Erro News", e); 
                document.getElementById('news-container').innerHTML = "Notícias indisponíveis no momento.";
            }
        }

        // INICIALIZAÇÃO E INTERVALOS
        fetchWeather(); fetchLoterias(); fetchNews();
        setInterval(fetchWeather, 600000); // 10 min
        setInterval(fetchLoterias, 3600000); // 1 hora
        setInterval(fetchNews, 1800000); // 30 min
    </script>
</body>
</html>
