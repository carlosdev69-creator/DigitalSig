<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digital Signage - Americana</title>
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      --card-bg: rgba(30, 41, 59, 0.7);
      --text-main: #f8fafc;
      --accent: #38bdf8;
      --loto-color: #9b51e0;
      --mega-color: #209869;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      background: var(--bg-gradient);
      color: var(--text-main);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      padding: 3vh 5vw;
    }

    .logo-container {
      position: absolute;
      top: 3vh;
      left: 5vw;
      z-index: 20;
    }

    .logo-container img {
      max-height: 60px;
      filter: drop-shadow(0 0 10px rgba(0, 0, 0, 0.5));
    }

    #weather-widget {
      position: absolute;
      top: 3vh;
      right: 5vw;
      text-align: right;
    }

    #temp {
      font-size: 2.8rem;
      font-weight: bold;
      line-height: 1;
    }

    #condition {
      font-size: 1.1rem;
      color: #fff;
      margin-top: 4px;
      text-transform: capitalize;
    }

    #city-label {
      font-size: 1rem;
      color: var(--accent);
      margin-top: 2px;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    #date {
      font-size: 1.5rem;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    #clock {
      font-size: 6.5rem;
      font-weight: 800;
      line-height: 1;
    }

    main {
      flex: 1;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .slide {
      position: absolute;
      width: 100%;
      max-width: 1000px;
      background: var(--card-bg);
      padding: 3rem;
      border-radius: 25px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px);
      opacity: 0;
      visibility: hidden;
      transition: opacity 1s ease-in-out;
    }

    .slide.active {
      opacity: 1;
      visibility: visible;
    }

    h2 {
      margin-bottom: 2rem;
      font-size: 2rem;
      border-left: 6px solid var(--accent);
      padding-left: 1.5rem;
    }

    .loto-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 15px;
      justify-items: center;
    }

    .mega-grid {
      grid-template-columns: repeat(6, 1fr) !important;
    }

    .ball {
      width: 70px;
      height: 70px;
      background: var(--loto-color);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      font-weight: bold;
      box-shadow: 5px 5px 15px rgba(0, 0, 0, 0.4);
    }

    .mega-grid .ball {
      background: var(--mega-color);
    }

    .news-item {
      padding: 1.2rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .news-item h4 {
      font-size: 1.2rem;
      line-height: 1.4;
      font-weight: 600;
    }

    @media (max-width: 1024px) {
      #clock {
        font-size: 4.5rem;
      }

      .slide {
        padding: 2rem;
      }

      .ball {
        width: 58px;
        height: 58px;
        font-size: 1.4rem;
      }
    }
  </style>
</head>
<body>
  <div class="logo-container">
    <img src="logo-empresa.png" alt="Logo da empresa" />
  </div>

  <div id="weather-widget">
    <div id="temp">--°C</div>
    <div id="condition">Buscando clima...</div>
    <div id="city-label">Americana/SP</div>
  </div>

  <header>
    <div id="date">--</div>
    <div id="clock">00:00:00</div>
  </header>

  <main>
    <div id="slide-lottery" class="slide active">
      <h2 id="lottery-title">Lotofácil</h2>
      <div id="lottery-results" class="loto-grid">Aguardando dados...</div>
    </div>

    <div id="slide-mega" class="slide">
      <h2 id="mega-title" style="border-left-color: var(--mega-color);">
        Mega-Sena
      </h2>
      <div id="mega-results" class="loto-grid mega-grid">Aguardando dados...</div>
    </div>

    <div id="slide-news" class="slide">
      <h2>G1 - Região de Campinas</h2>
      <div id="news-container">Buscando notícias...</div>
    </div>
  </main>

  <script>
    const CONFIG = {
      INTERVAL_SLIDE: 15000,
      INTERVAL_REFRESH: 10 * 60 * 1000
    };

    function updateClock() {
      const now = new Date();

      const dateOpts = {
        weekday: "long",
        day: "numeric",
        month: "long",
        year: "numeric",
        timeZone: "America/Sao_Paulo"
      };

      const timeOpts = {
        timeZone: "America/Sao_Paulo",
        hour12: false,
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
      };

      document.getElementById("date").innerText =
        now.toLocaleDateString("pt-BR", dateOpts).toUpperCase();

      document.getElementById("clock").innerText =
        now.toLocaleTimeString("pt-BR", timeOpts);
    }

    let currentSlide = 0;

    function rotateSlides() {
      const slides = document.querySelectorAll(".slide");
      slides[currentSlide].classList.remove("active");
      currentSlide = (currentSlide + 1) % slides.length;
      slides[currentSlide].classList.add("active");
    }

    async function getJson(url) {
      const response = await fetch(url, {
        method: "GET",
        headers: {
          "Content-Type": "application/json"
        },
        cache: "no-store"
      });

      const data = await response.json().catch(() => ({}));

      if (!response.ok) {
        throw new Error(data.error || `Erro HTTP ${response.status}`);
      }

      return data;
    }

    async function updateWeather() {
      try {
        const data = await getJson("/api/weather");

        document.getElementById("temp").innerText = `${data.temp}°C`;
        document.getElementById("condition").innerText = data.description;
        document.getElementById("city-label").innerText = data.cityLabel || "Americana/SP";
      } catch (error) {
        console.error("Erro ao atualizar clima:", error);
        document.getElementById("condition").innerText = "Erro ao ler clima";
      }
    }

    async function updateLoterias() {
      try {
        const data = await getJson("/api/loterias");

        const megaTitle = document.getElementById("mega-title");
        const megaResults = document.getElementById("mega-results");
        megaTitle.innerText = `Mega-Sena - Concurso ${data.mega.concurso}`;
        megaResults.innerHTML = data.mega.dezenas
          .map((numero) => `<div class="ball">${numero}</div>`)
          .join("");

        const lotoTitle = document.getElementById("lottery-title");
        const lotoResults = document.getElementById("lottery-results");
        lotoTitle.innerText = `Lotofácil - Concurso ${data.lotofacil.concurso}`;
        lotoResults.innerHTML = data.lotofacil.dezenas
          .map((numero) => `<div class="ball">${numero}</div>`)
          .join("");
      } catch (error) {
        console.error("Erro ao atualizar loterias:", error);
        document.getElementById("mega-results").innerText = "Erro ao buscar Mega-Sena";
        document.getElementById("lottery-results").innerText = "Erro ao buscar Lotofácil";
      }
    }

    async function updateNews() {
      try {
        const data = await getJson("/api/news");
        const container = document.getElementById("news-container");

        if (!Array.isArray(data.items) || data.items.length === 0) {
          container.innerText = "Nenhuma notícia encontrada";
          return;
        }

        container.innerHTML = data.items
          .map(
            (item) => `
              <div class="news-item">
                <h4>${item.title}</h4>
              </div>
            `
          )
          .join("");
      } catch (error) {
        console.error("Erro ao atualizar notícias:", error);
        document.getElementById("news-container").innerText =
          "Erro ao buscar Notícias G1";
      }
    }

    async function refreshAll() {
      await Promise.allSettled([
        updateWeather(),
        updateLoterias(),
        updateNews()
      ]);
    }

    updateClock();
    setInterval(updateClock, 1000);

    setInterval(rotateSlides, CONFIG.INTERVAL_SLIDE);

    refreshAll();
    setInterval(refreshAll, CONFIG.INTERVAL_REFRESH);
  </script>
</body>
</html>
